server.port=${PORT:3001}

# Daily at 09:00 server time (Spring: second minute hour day month weekday)
reminder.cron=${REMINDER_CRON:0 0 9 * * ?}

# Supabase (same variables as Node server/.env — can pass as env or JVM system properties)
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

# Gmail SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${GMAIL_USER:}
spring.mail.password=${GMAIL_APP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.application.name=payment-reminder-server
